<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO -->
  <meta name="description" content="A higher or lower themed dice game">
  <meta name="keywords" content="lucky, roll, dice, game, higher, lower">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="assets/style.css">
  <!-- Google fonts import -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <!-- Fav Icon -->
  
  <!-- Title -->
  <title>Lucky Roll Dice Game</title>
</head>
<body>
  <header>
    <h1 class="title container">Lucky Roll Dice Game</h1>
  </header>
  <main>
    <!-- Container for Welcome Page -->
    <div id="welcome-page" class="welcome-page hide">
      <h2 class="welcome-page__slogan container">Fancy your luck?</h2>
        <div>
          <p class="welcome-page__description container">
            Select a number of dice to roll and guess higher or lower. The more correct answers, the more points! Try and get your highscore!    
          </p>
        </div>
      <button id="start-btn" class="btn" onclick="startGame()">Start</button>
    </div>
    <!-- Container for Game Section -->
    <!-- Images from:  https://icon-icons.com/ -->
    <div id="game-page" class="game-page container ">
      <label for="number-selector"># of Dice: </label>
      <input id="number-selector" type="number" min="1" max="6" value="1">
      <button id="roll-btn" class="btn" onclick="rollDice()">Roll Dice</button>
      <div id="dice-result">

      </div>
      <div id="dice-images">

      </div>
    </div>
    <!-- Container for End of Game Section -->
    <div id="end-of-game" class="end-of-game container hide">
      <p>end game</p>
    </div>
  </main>
  <footer>
    <p>Copyright Craig90Dev</p>
  </footer>
</body>
<script src="assets/script.js"></script>
</html>
